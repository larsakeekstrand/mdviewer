<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MDViewer</title>
    <link rel="stylesheet" href="github-markdown.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="update-banner" id="update-banner" hidden role="status">
      <span class="update-banner-text" id="update-banner-text"></span>
      <button
        id="update-banner-view"
        class="update-banner-btn primary"
        type="button"
      >
        View release
      </button>
      <button
        id="update-banner-dismiss"
        class="update-banner-btn"
        type="button"
        aria-label="Dismiss"
        title="Dismiss"
      >
        ×
      </button>
    </div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title" id="tree-title">Files</span>
      </div>
      <ul class="tree" id="tree" role="tree"></ul>
    </aside>
    <div class="splitter" id="splitter" role="separator" aria-orientation="vertical"></div>
    <main class="preview-pane" id="preview-pane">
      <div class="tab-bar" id="tab-bar" hidden>
        <div class="tabs" id="tabs" role="tablist"></div>
        <div class="toolbar">
          <button
            id="toggle-raw"
            class="toolbar-btn"
            type="button"
            aria-pressed="false"
            title="Toggle raw / rendered view"
          >
            Raw
          </button>
        </div>
      </div>
      <div class="preview-scroll" id="preview-scroll">
        <div class="preview-empty" id="preview-empty">
          Select a file from the tree to preview.
        </div>
        <article class="markdown-body" id="preview" hidden></article>
      </div>
      <div class="find-bar" id="find-bar" hidden role="search">
        <input
          id="find-input"
          class="find-input"
          type="text"
          placeholder="Find"
          aria-label="Find in document"
          autocomplete="off"
          spellcheck="false"
        />
        <span class="find-count" id="find-count" aria-live="polite"></span>
        <button
          id="find-case"
          class="find-toggle"
          type="button"
          aria-pressed="false"
          title="Match case"
          aria-label="Match case"
        >
          Aa
        </button>
        <button
          id="find-word"
          class="find-toggle"
          type="button"
          aria-pressed="false"
          title="Whole word"
          aria-label="Whole word"
        >
          \b
        </button>
        <button
          id="find-prev"
          class="find-btn"
          type="button"
          title="Previous match (⇧⏎)"
          aria-label="Previous match"
        >
          ↑
        </button>
        <button
          id="find-next"
          class="find-btn"
          type="button"
          title="Next match (⏎)"
          aria-label="Next match"
        >
          ↓
        </button>
        <button
          id="find-close"
          class="find-btn"
          type="button"
          title="Close (Esc)"
          aria-label="Close find"
        >
          ×
        </button>
      </div>
    </main>

    <script src="morphdom-umd.min.js"></script>
    <!-- mermaid 11.15.0 dist/mermaid.min.js; sets window.mermaid. Classic
         script so it runs before the deferred app.js module. -->
    <script src="mermaid.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
