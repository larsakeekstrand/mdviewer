<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        font-size: 13px;
        line-height: 1.5;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 16px;
      }
      .row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 12px;
      }
      .row input {
        margin-top: 2px;
      }
      .hint {
        opacity: 0.7;
        margin: 4px 0 0 24px;
      }
      .version {
        margin-top: 20px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <h1>Settings</h1>
    <div class="row">
      <input type="checkbox" id="beta-toggle" />
      <label for="beta-toggle">
        Receive beta (pre-release) updates
        <div class="hint">
          Beta builds may be unstable. You can switch back to stable releases at
          any time; the change takes effect at the next update check.
        </div>
      </label>
    </div>
    <div class="version" id="version">Current version: …</div>
    <script type="module" src="preferences.js"></script>
  </body>
</html>
