# Application settings (plain key=value format, unknown extension)
# This file tests MDViewer's fallback: line numbers shown, no syntax color.

[general]
log_level = info
max_retries = 3
timeout = 30

[database]
host = localhost
port = 5432
name = myapp_db
pool_size = 10

[cache]
backend = redis
ttl_seconds = 300
max_entries = 1000

# Feature flags
[features]
enable_beta = false
dark_mode_default = true
