name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release as (e.g. v0.1.0). Must already exist as a git tag."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_TAG: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: ${{ steps.tag.outputs.value }}
          releaseBody: |
            ## Install (Apple Silicon)

            Download `mdviewer_<version>_aarch64.dmg`, open it, and drag
            `mdviewer.app` to Applications.

            ### Required: remove the quarantine flag

            Builds are ad-hoc signed but not signed by an Apple Developer ID.
            On macOS 15 (Sequoia) and later, browser-downloaded unsigned apps
            are reported as "damaged" by Gatekeeper. Run this once after
            installing:

                sudo xattr -dr com.apple.quarantine /Applications/mdviewer.app

            Then double-click the app in Applications. It opens normally
            from then on.
          releaseDraft: true
          prerelease: false
          args: --target aarch64-apple-darwin
